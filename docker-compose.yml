version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: mba-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mobile_betting_assistant
    ports:
      - "5432:5432"
    volumes:
      - mba-postgres-data:/var/lib/postgresql/data

volumes:
  mba-postgres-data:
